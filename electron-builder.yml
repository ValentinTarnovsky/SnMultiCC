appId: com.sndevelopment.snmulticc
productName: SnMultiCC
copyright: Copyright © 2026 Valentin Tarnovsky

directories:
  output: release/${version}
  buildResources: build

asar: true
# node-pty ships a native .node addon that must live outside the asar archive.
asarUnpack:
  - '**/node_modules/node-pty/**'

files:
  - out/**
  - package.json

# Tray icon, copied next to the app so the main process can load it at runtime.
extraResources:
  - from: build/icon.png
    to: icon.png

# node-pty is N-API (ABI-stable) and ships prebuilt binaries that load in
# Electron directly, so no native rebuild is needed (and avoids requiring a
# C++ toolchain). asarUnpack keeps the .node files loadable on disk.
npmRebuild: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}

portable:
  artifactName: ${productName}-${version}-portable.${ext}

mac:
  category: public.app-category.developer-tools
  # Signing / notarization are out of scope for the OSS v1.
  identity: null
  hardenedRuntime: false
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

linux:
  category: Development
  maintainer: Valentin Tarnovsky <tarnovskyvalentin@gmail.com>
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
