name: Release

# Build installers/portables on all three OSes and attach them to the
# GitHub Release for the pushed tag. node-pty is N-API, so no native rebuild
# is needed, each runner just packages its own prebuilt binary.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach artifacts to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npm run dist:win
          - os: macos-latest
            cmd: npm run dist:mac
          - os: ubuntu-latest
            cmd: npm run dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build and package
        run: ${{ matrix.cmd }}

      # Emit a "<artifact>.sha256" sidecar for every distributable so the in-app
      # auto-updater can verify the bytes it downloads before executing them.
      # bash + node are available on all three runners (Git Bash on Windows).
      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release
          for f in $(find . -type f \( -name 'SnMultiCC-*.exe' -o -name 'SnMultiCC-*.dmg' -o -name 'SnMultiCC-*.zip' -o -name 'SnMultiCC-*.AppImage' -o -name 'snmulticc_*.deb' \)); do
            node -e "const c=require('crypto'),fs=require('fs'),p=require('path');const f=process.argv[1];const h=c.createHash('sha256').update(fs.readFileSync(f)).digest('hex');fs.writeFileSync(f+'.sha256',h+'  '+p.basename(f)+'\n');console.log('sha256',p.basename(f),h)" "$f"
          done

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: false
          # Match only the named distributables, NOT the win-unpacked/ helper
          # binaries (elevate.exe, OpenConsole.exe, the raw SnMultiCC.exe, etc.).
          # NOTE: do NOT set generate_release_notes here. This step runs once
          # per OS in the matrix, and each run would re-generate and append the
          # changelog, producing a triplicated release body. Notes are written
          # exactly once by the separate release-notes job below.
          files: |
            release/**/SnMultiCC-*.exe
            release/**/SnMultiCC-*.dmg
            release/**/SnMultiCC-*.zip
            release/**/SnMultiCC-*.AppImage
            release/**/snmulticc_*.deb
            release/**/*.sha256

  release-notes:
    name: Release notes
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Single, authoritative pass that sets the title and the generated
      # changelog once. Runs after the build matrix so it has the final say on
      # the release body (append_body: false replaces, never accumulates).
      - name: Set release title and notes
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: SnMultiCC ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          append_body: false
