name: Release

# Build installers/portables on all three OSes and attach them to the
# GitHub Release for the pushed tag. node-pty is N-API, so no native rebuild
# is needed, each runner just packages its own prebuilt binary.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach artifacts to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npm run dist:win
          - os: macos-latest
            cmd: npm run dist:mac
          - os: ubuntu-latest
            cmd: npm run dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build and package
        run: ${{ matrix.cmd }}

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: SnMultiCC ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          # Match only the named distributables, NOT the win-unpacked/ helper
          # binaries (elevate.exe, OpenConsole.exe, the raw SnMultiCC.exe, …).
          files: |
            release/**/SnMultiCC-*.exe
            release/**/SnMultiCC-*.dmg
            release/**/SnMultiCC-*.zip
            release/**/SnMultiCC-*.AppImage
            release/**/snmulticc_*.deb
